services:
  - type: web
    name: Luz Agenda
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: LuzAgenda
          property: connectionString
      - key: ENABLE_LIGACOES
        value: "false"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: LuzAgenda
    plan: free
    region: oregon
    databaseName: luzagenda_db
    user: luzagenda_db_user
