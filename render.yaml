services:
  - type: web
    name: luz-agenda
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: luzagenda-db
          property: connectionString
      - key: ENABLE_LIGACOES
        value: "false"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: luzagenda-db
    plan: free
    region: oregon
    databaseName: luzagenda
    user: luzagenda_user
