<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#062b63">
  <title>{% block title %}LuzAgenda{% endblock %}</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo-luz-da-vida.jpg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('main.home') }}">
        <img src="{{ url_for('static', filename='img/logo-luz-da-vida.jpg') }}" alt="Clínica Luz da Vida">
        <span>LuzAgenda</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu"><span class="navbar-toggler-icon"></span></button>
      <div id="menu" class="collapse navbar-collapse">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="{{ url_for('main.agendar_visita') }}">Visita</a>
          <a class="nav-link" href="{{ url_for('main.agendar_ligacao') }}">Ligação</a>
          <a class="nav-link" href="{{ url_for('main.meu_agendamento') }}">Meu agendamento</a>
          {% if session.get("admin_ok") %}
          <a class="nav-link" href="{{ url_for('main.admin_dashboard') }}">Admin</a>
          <a class="nav-link" href="{{ url_for('main.admin_logout') }}">Sair</a>
          {% else %}
          <a class="nav-link" href="{{ url_for('main.admin_dashboard') }}">Admin</a>
          {% endif %}
        </div>
      </div>
    </div>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer class="py-4 border-top bg-white">
    <div class="container small text-muted d-flex flex-wrap justify-content-between gap-2">
      <span>Clínica Luz da Vida</span>
      <span>Projeto Integrador - Desenvolvimento de Sistemas</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
